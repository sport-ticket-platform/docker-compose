syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.backend.grpc";

service UserService {
  // Login
  rpc GetUserByEmail (GetUserLoginInfoByEmailRequest) returns (UserLoginInfoResponse);
  rpc GetUserByPhone (GetUserLoginInfoByPhoneRequest) returns (UserLoginInfoResponse);
  rpc GetUserById (GetUserLoginInfoByIdRequest) returns (UserLoginInfoResponse);

  // Signup And Validations
  rpc CheckEmailExists (CheckEmailExistsRequest) returns (EmailExistsResponse);
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);

  // reset password
  rpc ChangeUserPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
}

// =====================================
//                LOGIN
// =====================================
message GetUserLoginInfoByEmailRequest {
  string email = 1;
}

message GetUserLoginInfoByPhoneRequest {
  string phone = 1;
}

message GetUserLoginInfoByIdRequest {
  int64 id = 1;
}

message UserLoginInfoResponse {
  int64 id = 1;
  string role = 2;
  string email = 3;
  string phone = 4;
  string password = 5;
  bool status = 6;
  bool is_two_factor_enabled = 7;
}


// ====================================
//        SIGNUP AND VALIDATIONS
// ====================================
message CheckEmailExistsRequest {
  string email = 1;
}

message EmailExistsResponse {
  bool exists = 1;
}

message CreateUserRequest {
  string email = 1;
  string first_name = 2;
  string last_name = 3;
  string password = 4;
}

message CreateUserResponse {
  bool success = 1;
  int64 user_id = 2;
}


// =====================================
//           RESET PASSWORD
// =====================================
message ResetPasswordRequest {
  int64 id = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  bool success = 1;
}